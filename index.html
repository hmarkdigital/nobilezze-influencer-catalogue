<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nobilezze Club — Entry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --grey: #B4B4B4;
            --font-display: 'Cormorant Garamond', serif;
            --font-ui: 'DM Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--black);
            font-family: var(--font-ui);
            -webkit-font-smoothing: antialiased;
        }

        /* ── VIDEO SETUP ───────────────────────────────────────── */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        video.active {
            opacity: 1;
        }

        /* ── OVERLAY ───────────────────────────────────────────── */
        .entry-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            opacity: 0;
            transition: opacity 1.5s ease; /* Logo fade-in */
        }

        .logo {
            width: 200px;
            margin-bottom: 80px;
            transition: opacity 0.4s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        input[type="password"] {
            width: 280px;
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 14px 20px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .instruction {
            margin-top: 12px;
            font-size: 11px;
            color: var(--grey);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .error-msg {
            height: 20px;
            margin-top: 15px;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 14px;
            color: var(--white);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── WHITE OUT ─────────────────────────────────────────── */
        .fade-to-white {
            position: fixed;
            inset: 0;
            background-color: var(--white);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .fade-to-white.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .logo {
                width: 140px;
            }
            input[type="password"] {
                width: 240px;
            }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="v1" playsinline muted preload="auto" class="active"></video>
        <video id="v2" playsinline muted preload="auto" style="display: none;"></video>
    </div>

    <div class="entry-overlay" id="overlay">
        <img src="https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/public/products/nc-logo-white.svg" alt="Nobilezze Club" class="logo">
        
        <div class="input-group">
            <input type="password" id="pw" autocomplete="off" autofocus>
            <span class="instruction">KÉREM ADJA MEG A JELSZÓT</span>
            <div id="error" class="error-msg">Hibás a jelszó próbálja újra</div>
        </div>
    </div>

    <div class="fade-to-white" id="whiteout"></div>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const pwInput = document.getElementById('pw');
        const overlay = document.getElementById('overlay');
        const errorMsg = document.getElementById('error');
        const whiteout = document.getElementById('whiteout');

        const v1Url = "https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/sign/nc-hero/hf_20260312_161827_8f0a2f67-87e1-4c99-b203-35d759500836.mp4?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83ZjFmYTZkYi1jMzRjLTQ2YjMtODhiNy0yNTM2MGQzOWViMWMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJuYy1oZXJvL2hmXzIwMjYwMzEyXzE2MTgyN184ZjBhMmY2Ny04N2UxLTRjOTktYjIwMy0zNWQ3NTk1MDA4MzYubXA0IiwiaWF0IjoxNzczMzM0NTE5LCJleHAiOjE4MDQ4NzA1MTl9.4rokQD9xtNlrclBy1xL5Lhn-NYCSf-ED_DDyLVfGx48";
        const v2Url = "https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/sign/nc-hero/hf_20260312_174103_bb8bc38f-fa95-4580-8868-4f381162179c.mp4?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83ZjFmYTZkYi1jMzRjLTQ2YjMtODhiNy0yNTM2MGQzOWViMWMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJuYy1oZXJvL2hmXzIwMjYwMzEyXzE3NDEwM19iYjhiYzM4Zi1mYTk1LTQ1ODAtODg2OC00ZjM4MTE2MjE3OWMubXA0IiwiaWF0IjoxNzczMzM3NzgxLCJleHAiOjE4MDQ4NzM3ODF9.hKHVoB8jB13NW_T-O4LkWT2VI5579llyrwJ6kAXvPmQ";

        v1.src = v1Url;
        v2.src = v2Url;

        // Start V1 on load
        window.addEventListener('load', () => {
            v1.play();
            // Fade in logo & input after slight delay for premium feel
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 500);
        });

        // Loop management: Stop V1 on last frame
        v1.addEventListener('ended', () => {
            v1.pause();
        });

        // Password logic
        pwInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = pwInput.value.trim().toLowerCase();
                if (val === 'nbc123') {
                    startTransition();
                } else {
                    showError();
                }
            }
        });

        function showError() {
            errorMsg.classList.add('visible');
            pwInput.value = '';
            setTimeout(() => {
                errorMsg.classList.remove('visible');
            }, 2500);
        }

        function startTransition() {
            // 1. Fade out overlay
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';

            setTimeout(() => {
                // 2. Hide V1, Show V2
                v1.style.display = 'none';
                v2.style.display = 'block';
                v2.style.opacity = '1';
                v2.play();

                // 3. Listen for V2 end
                v2.addEventListener('ended', () => {
                    // 4. Fade to white
                    whiteout.classList.add('active');
                    setTimeout(() => {
                        window.location.href = 'katalogus.html';
                    }, 800);
                });
            }, 400); // 0.4s fade out
        }
    </script>
</body>
</html>
