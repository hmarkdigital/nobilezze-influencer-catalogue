<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nobilezze Club — Entry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --grey: #B4B4B4;
            --font-display: 'Cormorant Garamond', serif;
            --font-ui: 'DM Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--black);
            font-family: var(--font-ui);
            -webkit-font-smoothing: antialiased;
        }

        /* ── VIDEO SETUP ───────────────────────────────────────── */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        video.active {
            opacity: 1;
        }

        /* ── OVERLAY ───────────────────────────────────────────── */
        .entry-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            opacity: 0;
            transition: opacity 1.5s ease; /* Logo fade-in */
        }

        .logo {
            width: 200px;
            margin-bottom: 80px;
            transition: opacity 0.4s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        input[type="password"] {
            width: 280px;
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 14px 20px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .instruction {
            margin-top: 12px;
            font-size: 11px;
            color: var(--grey);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .error-msg {
            height: 20px;
            margin-top: 15px;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 14px;
            color: var(--white);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .enter-btn {
            margin-top: 24px;
            width: 280px;
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 13px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .enter-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        /* ── WHITE OUT ─────────────────────────────────────────── */
        .fade-to-white {
            position: fixed;
            inset: 0;
            background-color: var(--white);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .fade-to-white.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .logo { width: 140px; }
            input[type="password"] { width: 240px; }
            .enter-btn { width: 240px; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="v1" playsinline muted preload="auto" class="active"></video>
        <video id="v2" playsinline muted preload="auto" style="display: none;"></video>
    </div>

    <div class="entry-overlay" id="overlay">
        <img src="https://ppjvijirnkjuktlmqagx.supabase.co/storage/v1/object/public/products/nc-logo-white.svg" alt="Nobilezze Club" class="logo">
        
        <div class="input-group">
            <input type="password" id="pw" autocomplete="off" autofocus>
            <span class="instruction">KÉREM ADJA MEG A JELSZÓT</span>
            <div id="error" class="error-msg">Hibás a jelszó próbálja újra</div>
            <button class="enter-btn" id="enterBtn">Belépés</button>
        </div>
    </div>

    <div class="fade-to-white" id="whiteout"></div>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const pwInput = document.getElementById('pw');
        const overlay = document.getElementById('overlay');
        const errorMsg = document.getElementById('error');
        const whiteout = document.getElementById('whiteout');

        const v1Url = "https://ppjvijirnkjuktlmqagx.supabase.co/storage/v1/object/public/nc-hero/nc-door-1.mp4";
        const v2Url = "https://ppjvijirnkjuktlmqagx.supabase.co/storage/v1/object/public/nc-hero/nc-door-2.mp4";

        v1.src = v1Url;
        v2.src = v2Url;

        // Start V1 on load
        window.addEventListener('load', () => {
            v1.play();
            // Fade in logo & input after slight delay for premium feel
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 500);
        });

        // Loop management: Stop V1 on last frame
        v1.addEventListener('ended', () => {
            v1.pause();
        });

        // Password logic
        function checkPassword() {
            const val = pwInput.value.trim().toLowerCase();
            if (val === 'nbc123') {
                startTransition();
            } else {
                showError();
            }
        }

        pwInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        document.getElementById('enterBtn').addEventListener('click', checkPassword);

        function showError() {
            errorMsg.classList.add('visible');
            pwInput.value = '';
            setTimeout(() => {
                errorMsg.classList.remove('visible');
            }, 2500);
        }

        function goToKatalogus() {
            whiteout.classList.add('active');
            setTimeout(() => {
                window.location.href = 'katalogus.html';
            }, 800);
        }

        function startTransition() {
            // 1. Fade out overlay
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';

            setTimeout(() => {
                // 2. Hide V1, Show V2
                v1.style.display = 'none';
                v2.style.display = 'block';
                v2.style.opacity = '1';

                // Fallback: ha a videó 10mp-en belül nem indul/végez, átirányítás
                const fallback = setTimeout(goToKatalogus, 10000);

                v2.addEventListener('error', () => {
                    clearTimeout(fallback);
                    goToKatalogus();
                });

                v2.addEventListener('ended', () => {
                    clearTimeout(fallback);
                    goToKatalogus();
                });

                const playPromise = v2.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        clearTimeout(fallback);
                        goToKatalogus();
                    });
                }
            }, 400);
        }
    </script>
</body>
</html>
