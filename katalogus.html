    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    
    <style>
        /* Modern CSS Reset & Vars */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #FFFFFF;
            --text-main: #000000;
            --text-muted: #B4B4B4;
            --border-light: #E8E8E8;
            --white: #FFFFFF;
            
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-ui: 'DM Sans', system-ui, sans-serif;
            
            --spacing-base: 32px;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            scrollbar-width: none; /* Firefox */
        }
        html { scrollbar-width: none; }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar { display: none; } /* Chrome, Safari */

        /* ── 1. HEADER ────────────────────────────────────────── */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            background-color: transparent;
            border-bottom: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header.scrolled {
            height: 70px;
            background-color: var(--white);
            border-bottom: 1px solid var(--border-light);
        }

        .logo-img {
            height: 28px;
            width: auto;
            transition: filter 0.6s ease;
        }

        /* .header:not(.scrolled) .logo-img: filter removed in favor of JS src swap for better quality */

        .header.scrolled .logo-img {
            filter: none; /* Black logo */
        }

        /* ── 2. HERO SECTION ───────────────────────────────────── */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; /* Fallback */
        }

        /* ── PAGE ENTRY OVERLAY ────────────────────────────────── */
        .page-enter {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            opacity: 1;
            pointer-events: none;
            transition: opacity 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .page-enter.out { opacity: 0; }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .hero-text {
            position: relative;
            z-index: 3;
            color: var(--white);
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4.5rem); /* Increased size */
            font-style: italic;
            font-weight: 400;
            text-align: center;
            letter-spacing: -0.01em; /* Tighter for display typography */
            padding: 0 40px;
            max-width: 900px;
            line-height: 1.1;
            
            /* Initial state for JS animation */
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .hero-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── 3. FILTER BAR ─────────────────────────────────────── */
        .filter-section {
            width: 100%;
            background-color: var(--bg-color);
            padding: 40px 0 20px; /* More vertical space */
        }

        .filter-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-start; /* Left aligned, like high-end showroom */
            gap: 24px;
        }

        .filter-btn {
            font-family: var(--font-ui);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
            padding: 4px 0;
            border-radius: 0;
            border: none;
            border-bottom: 1px solid transparent;
            background-color: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: all var(--transition-smooth);
            outline: none;
        }

        .filter-btn:not(.active) {
            border-color: transparent;
            color: var(--text-muted);
        }

        .filter-btn:not(.active):hover {
            color: var(--text-main);
            border-bottom-color: var(--text-main);
        }

        .filter-btn.active {
            color: var(--text-main);
            border-bottom-color: var(--text-main);
        }

        /* ── 4. PRODUCT GRID ───────────────────────────────────── */
        .catalog-section {
            padding: 60px 20px 120px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 80vh; /* Prevent layout jump */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 16px; /* Tighter horizontal gap for edge-to-edge feel */
        }

        @media (max-width: 1024px) {
            .grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 40px 24px;
            }
        }

        @media (max-width: 768px) {
            .grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 24px 12px;
            }
            .filter-container {
                justify-content: center;
                gap: 16px;
            }
        }

        /* ── PRODUCT CARD ──────────────────────────────────────── */
        .card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            background-color: transparent; /* No background */
            box-shadow: none; /* No shadow */
            
            /* Initial state for scroll animation */
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card.is-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Filtering transition state */
        .card.is-hiding {
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
        }

        .card-image-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4; /* Vertical fashion ratio */
            background-color: #F5F5F5; /* Subtle showroom light grey */
            overflow: hidden;
            margin-bottom: 12px;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keep product visible but full scale */
            padding: 0; /* REMOVED padding - edge to edge */
            transition: transform var(--transition-smooth);
        }

        .card:hover .card-image {
            transform: scale(1.03);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            padding: 0 4px; /* Flush alignment like Massimo Dutti */
        }

        .card-brand {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .card-name {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 18px; /* Slightly smaller for showroom elegance */
            color: var(--text-main);
            line-height: 1.4;
            font-weight: 400;
        }

        .card-size {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── 5. LIGHTBOX ────────────────────────────────────────── */
        .lightbox {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* Animation */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lb-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .lb-close {
            position: absolute;
            top: 30px;
            right: 40px;
            background: none;
            border: none;
            color: var(--white);
            font-family: var(--font-ui);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            z-index: 10;
        }
        
        @media (max-width: 640px) {
            .lb-close { top: 20px; right: 20px; }
            .lb-content { padding: 20px; }
        }

        .lb-close:hover { opacity: 1; }

        .lb-image-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 80vh;
        }

        .lb-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
        }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .lb-nav:hover { opacity: 1; }
        .lb-nav:disabled { opacity: 0 !important; cursor: default; }
        
        .lb-prev { left: 5%; }
        .lb-next { right: 5%; }

        .lb-arrow {
            width: 30px;
            height: 1px;
            background-color: var(--white);
            position: relative;
        }

        .lb-prev .lb-arrow::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 1px;
            background-color: var(--white);
            transform-origin: left center;
            transform: rotate(-45deg);
        }
        .lb-prev .lb-arrow::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 1px;
            background-color: var(--white);
            transform-origin: left center;
            transform: rotate(45deg);
        }

        .lb-next .lb-arrow::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 8px;
            height: 1px;
            background-color: var(--white);
            transform-origin: right center;
            transform: rotate(-45deg);
        }
        .lb-next .lb-arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 8px;
            height: 1px;
            background-color: var(--white);
            transform-origin: right center;
            transform: rotate(45deg);
        }

        .lb-details {
            margin-top: 30px;
            text-align: center;
            color: var(--white);
        }

        .lb-brand {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }

        .lb-name {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 24px;
            font-weight: 400;
        }
        
        .lb-counter {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
            font-family: var(--font-ui);
        }

        /* ── 6. FOOTER ─────────────────────────────────────────── */
        .footer {
            background-color: var(--white);
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-logo {
            height: 24px;
            opacity: 0.8;
            filter: grayscale(100%);
        }
    </style>
</head>

            {

            {

            {
                id: 'nike-af1-wheat',
                brand: 'Nike',
                name: 'Air Force 1 Wheat',
                category: 'cipo',
                size: '38, 38.5, 39',
                images: [
                    'https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/public/products/13e311cf_38-38.5-39_.webp'
                ]
            },
            {
                id: 'nike-af1-pony-hair',
                brand: 'Nike',
                name: 'Air Force 1 Pony Hair',
                category: 'cipo',
                size: '39',
                images: [
                    'https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/public/products/743daa4b_39-pony_hair.webp'
                ]
            }
        ];

        // --- DOM ELEMENTS ---
        const grid = document.getElementById('productGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const heroText = document.getElementById('heroText');
        const header = document.getElementById('header');
        
        // Lightbox
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lbImg');
        const lbBrand = document.getElementById('lbBrand');
        const lbName = document.getElementById('lbName');
        const lbCounter = document.getElementById('lbCounter');
        const lbPrev = document.getElementById('lbPrev');
        const lbNext = document.getElementById('lbNext');
        const lbClose = document.getElementById('lbClose');

        let currentActiveItem = null;
        let currentImageIdx = 0;

        // --- PAGE ENTRY & HERO ANIMATION ---
        const pageEnter = document.getElementById('pageEnter');
        const heroVideo = document.querySelector('.hero-video');

        // Start fading out the white overlay after first paint
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                pageEnter.classList.add('out');
            });
        });

        // Fade in video as soon as it can play
        heroVideo.addEventListener('canplay', () => {
            heroVideo.style.opacity = '1';
        }, { once: true });

        // Fallback: reveal video after 3s regardless
        setTimeout(() => { heroVideo.style.opacity = '1'; }, 3000);

        // Hero text: sync with overlay fade (1.1s after entry)
        setTimeout(() => {
            heroText.classList.add('visible');
        }, 1100);

        // --- HEADER SCROLL LOGIC ---
        const logo = document.querySelector('.logo-img');
        const logoWhite = "https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/public/products/nc-logo-white.svg";
        const logoBlack = "https://wpmjustqzuavqgxoezdz.supabase.co/storage/v1/object/public/products/nc-logo-black.svg";

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                if (!header.classList.contains('scrolled')) {
                    header.classList.add('scrolled');
                    logo.src = logoBlack;
                }
            } else {
                if (header.classList.contains('scrolled')) {
                    header.classList.remove('scrolled');
                    logo.src = logoWhite;
                }
            }
        }, { passive: true });

        // Initial Logo Check
        if (window.scrollY <= 50) {
            logo.src = logoWhite;
        } else {
            logo.src = logoBlack;
            header.classList.add('scrolled');
        }

        // --- SCROLL ANIMATION (INTERSECTION OBSERVER) ---
        const observerOptions = {
            root: null,
            rootMargin: '0px 0px -50px 0px',
            threshold: 0.1
        };

        const scrollObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // Stagger effect
                    setTimeout(() => {
                        entry.target.classList.add('is-visible');
                    }, index * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // --- RENDER GRID ---
        function createCard(product) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.category = product.category;
            card.dataset.id = product.id;

            const sizeHtml = product.category === 'cipo' && product.size ? `<div class="card-size">Méret: ${product.size}</div>` : '';

            card.innerHTML = `
                <div class="card-image-wrap">
                    <img src="${product.images[0]}" alt="${product.name}" class="card-image" loading="lazy">
                </div>
                <div class="card-info">
                    <div class="card-brand">${product.brand}</div>
                    <div class="card-name">${product.name}</div>
                    ${sizeHtml}
                </div>
            `;

            card.addEventListener('click', () => openLightbox(product));
            return card;
        }

        function renderAll() {
            grid.innerHTML = '';
            products.filter(p => !p.soldOut).forEach(p => {
                const card = createCard(p);
                grid.appendChild(card);
                scrollObserver.observe(card);
            });
        }

        // --- FILTERING ---
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active state
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;
                const cards = document.querySelectorAll('.card');

                cards.forEach(card => {
                    const match = filter === 'all' || card.dataset.category === filter;
                    
                    if (match) {
                        card.style.display = 'flex';
                        // Re-trigger enter animation slightly
                        setTimeout(() => {
                            card.classList.remove('is-hiding');
                        }, 50);
                    } else {
                        card.classList.add('is-hiding');
                        setTimeout(() => {
                            card.style.display = 'none';
                        }, 400); // Wait for opacity/scale transition
                    }
                });
            });
        });

        // --- LIGHTBOX LOGIC ---
        function updateLightboxView() {
            lbImg.src = currentActiveItem.images[currentImageIdx];
            lbBrand.textContent = currentActiveItem.brand;
            lbName.textContent = currentActiveItem.name;
            
            if(currentActiveItem.images.length > 1) {
                lbCounter.textContent = `${currentImageIdx + 1} / ${currentActiveItem.images.length}`;
            } else {
                lbCounter.textContent = '';
            }

            // Button states
            lbPrev.disabled = currentActiveItem.images.length <= 1;
            lbNext.disabled = currentActiveItem.images.length <= 1;
        }

        function openLightbox(product) {
            currentActiveItem = product;
            currentImageIdx = 0;
            updateLightboxView();
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLb() {
            lb.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                lbImg.src = '';
            }, 300);
        }

        function nextImg(e) {
            if(e) e.stopPropagation();
            if(currentActiveItem.images.length <= 1) return;
            currentImageIdx = (currentImageIdx + 1) % currentActiveItem.images.length;
            updateLightboxView();
        }

        function prevImg(e) {
            if(e) e.stopPropagation();
            if(currentActiveItem.images.length <= 1) return;
            currentImageIdx = (currentImageIdx - 1 + currentActiveItem.images.length) % currentActiveItem.images.length;
            updateLightboxView();
        }

        // Lightbox Listeners
        lbClose.addEventListener('click', closeLb);
        lb.addEventListener('click', (e) => {
            if (e.target === lb || e.target.classList.contains('lb-content') || e.target.classList.contains('lb-image-container')) {
                closeLb();
            }
        });
        lbNext.addEventListener('click', nextImg);
        lbPrev.addEventListener('click', prevImg);

        document.addEventListener('keydown', (e) => {
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowRight') nextImg();
            if (e.key === 'ArrowLeft') prevImg();
        });

        // Touch swipe support for lightbox
        let touchStartX = 0;
        lb.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        lb.addEventListener('touchend', (e) => {
            const delta = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(delta) < 40) return; // ignore tiny taps
            if (delta < 0) nextImg();
            else prevImg();
        }, { passive: true });

        // Boot
        renderAll();

    </script>
